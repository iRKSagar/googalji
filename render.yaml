services:
  - type: web
    name: googalji-assembly
    runtime: python
    plan: starter          # paid tier — $7/month, no sleep
    buildCommand: pip install flask moviepy Pillow numpy requests
    startCommand: python googalji-assembly.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: COUNCIL_SECRET
        sync: false
      - key: COUNCIL_URL
        sync: false
      - key: VOICE_URL
        sync: false
      - key: IMAGE_URL
        sync: false
      - key: YT_CLIENT_ID
        sync: false
      - key: YT_CLIENT_SECRET
        sync: false
      - key: YT_REFRESH_TOKEN
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: IG_ACCOUNT_ID
        sync: false
      - key: PORT
        value: 5000
