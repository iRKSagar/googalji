<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Googalji — Pipeline Control</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: #0d0505;
      font-family: 'Crimson Pro', Georgia, serif;
      color: #f0dcc8;
      min-height: 100vh;
    }

    /* Lal Kitab texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 32px, rgba(140,20,20,0.03) 32px, rgba(140,20,20,0.03) 33px),
        repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(100,10,10,0.02) 48px, rgba(100,10,10,0.02) 49px);
      pointer-events: none;
      z-index: 0;
    }

    /* Red dust grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    #root { position: relative; z-index: 1; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0303; }
    ::-webkit-scrollbar-thumb { background: #7a1a1a; border-radius: 3px; }

    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 10px #c0392b; }
      50% { opacity:0.6; box-shadow: 0 0 4px #c0392b; }
    }
    @keyframes fadein {
      from { opacity:0; transform: translateY(6px); }
      to { opacity:1; transform: translateY(0); }
    }
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.85; }
      94% { opacity: 1; }
      97% { opacity: 0.9; }
      98% { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    button { transition: all 0.18s ease; font-family: 'Crimson Pro', Georgia, serif; }
    button:hover:not(:disabled) { filter: brightness(1.12); transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }

    .deva { font-family: 'Crimson Pro', Georgia, serif; }

    /* Lal Kitab red border decoration */
    .kitab-border {
      border: 1px solid #5a1a1a;
      border-top: 3px solid #8b2020;
      position: relative;
    }
    .kitab-border::before {
      content: '';
      position: absolute;
      top: -6px; left: 20px;
      width: 40px; height: 3px;
      background: #c0392b;
    }
    .kitab-border::after {
      content: '';
      position: absolute;
      top: -6px; right: 20px;
      width: 40px; height: 3px;
      background: #c0392b;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Config — update BEARER and URLs after workers are deployed ────────────────
const BEARER  = "thegoogalji_xK9mP1978";
const COUNCIL = "https://googalji-council.panditgoogalji.workers.dev/";
const VOICE   = "https://googalji-voice.panditgoogalji.workers.dev/";
const IMAGE   = "https://googalji-image.panditgoogalji.workers.dev/";
const RENDER  = "https://googalji.onrender.com";

const H = { "Authorization": `Bearer ${BEARER}`, "Content-Type": "application/json" };
// Daily fixed (4 horoscope groups) + rotating (8 categories)
const CATS = ["H1","H2","H3","H4","G","N","D","K","L","W","R","B"];
const CAT_LABELS = {
  H1: "Rashi: Mesh, Vrishabh, Mithun",
  H2: "Rashi: Kark, Singh, Kanya",
  H3: "Rashi: Tula, Vrishchik, Dhanu",
  H4: "Rashi: Makar, Kumbh, Meen",
  G:  "Graha Spotlight",
  N:  "Nakshatra Insight",
  D:  "Dasha & Antardasha",
  K:  "Kundali Yoga & Dosh",
  L:  "Love & Rishta",
  W:  "Weekly Spotlight",
  R:  "Lal Kitab Remedy",
  B:  "Birth Number + Graha"
};

// ── Log hook ──────────────────────────────────────────────────────────────────
function useLog() {
  const [logs, setLogs] = useState([]);
  const add = (msg, type="info") => {
    const ts = new Date().toLocaleTimeString();
    setLogs(l => [...l, { msg, type, ts, id: Date.now() + Math.random() }]);
  };
  const clear = () => setLogs([]);
  return { logs, add, clear };
}

// ── Status Pill ───────────────────────────────────────────────────────────────
function StatusPill({ status }) {
  const cfg = {
    idle:    { bg:"#140505", color:"#c07060", label:"Idle" },
    running: { bg:"#1a0808", color:"#c0392b", label:"Running…", pulse:true },
    success: { bg:"#080f08", color:"#4caf50", label:"Done ✓" },
    error:   { bg:"#1a0505", color:"#e74c3c", label:"Error" },
  };
  const c = cfg[status] || cfg.idle;
  return (
    <span style={{
      display:"inline-block", padding:"4px 18px", borderRadius:20,
      background:c.bg, color:c.color, fontSize:12, letterSpacing:"0.15em",
      animation: c.pulse ? "pulse 1.6s infinite" : "none",
      border:`1px solid ${c.color}40`,
      fontFamily:"'Crimson Pro', Georgia, serif"
    }}>
      {c.label}
    </span>
  );
}

// ── Log Console ───────────────────────────────────────────────────────────────
function LogConsole({ logs, onClear }) {
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [logs]);
  const colors = {
    step:"#f1948a", success:"#82e0aa", error:"#f1948a",
    warn:"#f0b27a", info:"#d5b8a0", id:"#f9e79f"
  };
  return (
    <div style={{ maxWidth:680, margin:"0 auto 32px",
      background:"#0a0303", border:"1px solid #3a0f0f",
      borderTop:"2px solid #7a1a1a", borderRadius:10, overflow:"hidden" }}>
      <div style={{
        display:"flex", justifyContent:"space-between", alignItems:"center",
        padding:"8px 16px", borderBottom:"1px solid #2a0a0a", background:"#0d0404"
      }}>
        <span style={{ fontSize:10, letterSpacing:"0.25em", color:"#c07060",
          textTransform:"uppercase" }}>Console</span>
        <button onClick={onClear} style={{
          background:"none", border:"none", color:"#4a1a1a",
          fontSize:10, cursor:"pointer", letterSpacing:"0.1em"
        }}>CLEAR</button>
      </div>
      <div style={{ padding:"12px 16px", maxHeight:200, overflowY:"auto",
        fontFamily:"monospace", fontSize:11.5 }}>
        {logs.length === 0
          ? <span style={{ color:"#6a3030" }}>Waiting…</span>
          : logs.map(l => (
            <div key={l.id} style={{
              color: colors[l.type] || colors.info,
              lineHeight:1.7, animation:"fadein 0.2s ease"
            }}>
              <span style={{ color:"#3a1010", marginRight:8 }}>{l.ts}</span>
              <span style={{ marginRight:6 }}>
                {l.type==="step" ? "›" : l.type==="success" ? "✓"
                  : l.type==="error" ? "✗" : l.type==="id" ? "#" : " "}
              </span>
              {l.msg}
            </div>
          ))
        }
        <div ref={endRef} />
      </div>
    </div>
  );
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({ show, title, subtitle, icon, onClose, children }) {
  if (!show) return null;
  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.82)", zIndex:100,
      display:"flex", alignItems:"center", justifyContent:"center", padding:20
    }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{
        background:"#0d0404", borderRadius:14,
        border:"1px solid #5a1a1a", borderTop:"3px solid #9b2020",
        padding:"28px 28px 24px", width:"100%", maxWidth:420,
        animation:"fadein 0.2s ease", boxShadow:"0 8px 60px rgba(180,0,0,0.2)",
        position:"relative"
      }}>
        {/* Red corner decorations */}
        <div style={{
          position:"absolute", top:8, left:8, width:16, height:16,
          borderTop:"2px solid #c0392b", borderLeft:"2px solid #c0392b"
        }} />
        <div style={{
          position:"absolute", top:8, right:8, width:16, height:16,
          borderTop:"2px solid #c0392b", borderRight:"2px solid #c0392b"
        }} />
        <div style={{
          position:"absolute", bottom:8, left:8, width:16, height:16,
          borderBottom:"2px solid #c0392b", borderLeft:"2px solid #c0392b"
        }} />
        <div style={{
          position:"absolute", bottom:8, right:8, width:16, height:16,
          borderBottom:"2px solid #c0392b", borderRight:"2px solid #c0392b"
        }} />

        <div style={{
          display:"flex", justifyContent:"space-between",
          alignItems:"flex-start", marginBottom:20
        }}>
          <div>
            <div style={{ fontSize:17, fontWeight:700, color:"#e8c0a0" }}>
              {icon} {title}
            </div>
            {subtitle && (
              <div className="deva" style={{ fontSize:12, color:"#c07060", marginTop:3 }}>
                {subtitle}
              </div>
            )}
          </div>
          <button onClick={onClose} style={{
            background:"none", border:"none", color:"#b06050",
            fontSize:20, cursor:"pointer", lineHeight:1
          }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Category Picker ────────────────────────────────────────────────────────────
const HOROSCOPE_CATS = ["H1","H2","H3","H4"];
const ROTATING_CATS  = ["G","N","D","K","L","W","R","B"];

function CatPicker({ value, onChange }) {
  const btn = (c, active, colorSet) => ({
    padding:"6px 11px", borderRadius:7, border:"none", cursor:"pointer",
    fontFamily:"'Crimson Pro', Georgia, serif", fontSize:11,
    background: active ? colorSet.activeBg : colorSet.bg,
    color: active ? colorSet.activeColor : colorSet.color,
    fontWeight: active ? 700 : 400,
    outline: active ? `1px solid ${colorSet.border}` : "1px solid transparent"
  });

  const horoColors = { bg:"#120303", activeBg:"#3a0808", color:"#7a3030", activeColor:"#ffc8b0", border:"#c03030" };
  const rotColors  = { bg:"#0d0903", activeBg:"#2a1a05", color:"#6a4020", activeColor:"#ffd898", border:"#a06020" };

  return (
    <div>
      <div style={{ fontSize:10, letterSpacing:"0.2em", color:"#c05040", textTransform:"uppercase", marginBottom:8 }}>Daily Horoscope</div>
      <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:14 }}>
        {HOROSCOPE_CATS.map(c => (
          <button key={c} onClick={() => onChange(c)} style={btn(c, value===c, horoColors)}>
            <span style={{ opacity:0.6, marginRight:4 }}>{c}</span>{CAT_LABELS[c]}
          </button>
        ))}
      </div>
      <div style={{ fontSize:10, letterSpacing:"0.2em", color:"#a06030", textTransform:"uppercase", marginBottom:8 }}>Jyotish Content</div>
      <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
        {ROTATING_CATS.map(c => (
          <button key={c} onClick={() => onChange(c)} style={btn(c, value===c, rotColors)}>
            <span style={{ opacity:0.6, marginRight:4 }}>{c}</span>{CAT_LABELS[c]}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function wakeRender(add) {
  add("Waking Render…", "step");
  for (let i = 0; i < 10; i++) {
    try {
      const r = await fetch(`${RENDER}/`, { signal: AbortSignal.timeout(9000) });
      if (r.ok) { add("Render is awake ✓", "success"); return; }
    } catch(e) {}
    add(`Render not ready… attempt ${i+2}`, "info");
    await new Promise(res => setTimeout(res, 8000));
  }
  throw new Error("Render did not wake after 80s");
}

async function callCouncil(category, add) {
  add(`Calling council — ${category}: ${CAT_LABELS[category] || category}…`, "step");
  const r = await fetch(COUNCIL, {
    method:"POST", headers:H,
    body: JSON.stringify({ category })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  const sid = d.id || d.script_id;
  add(`Script ID: ${sid}`, "id");
  add(`Topic: ${d.raw_topic || "—"}`, "info");
  return sid;
}

async function callVoiceAndImage(sid, add) {
  add("Generating voice + image in parallel…", "step");
  const [vr, ir] = await Promise.all([
    fetch(VOICE, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) }).then(r => r.json()),
    fetch(IMAGE, { method:"POST", headers:H, body: JSON.stringify({ script_id: sid }) }).then(r => r.json()),
  ]);
  if (vr.error) throw new Error("Voice: " + vr.error);
  if (ir.error) throw new Error("Image: " + ir.error);
  add("Voice ready ✓  Image ready ✓", "success");
}

async function callAssemble(sid, add, onVideoReady) {
  add("Triggering assembly…", "step");
  const r = await fetch(`${RENDER}/assemble`, {
    method:"POST", headers:H, body: JSON.stringify({ script_id: sid })
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`Assembly failed HTTP ${r.status}: ${t.slice(0,200)}`);
  }
  add("Assembly started ✓ — polling for completion…", "success");
  for (let i = 0; i < 25; i++) {
    await new Promise(res => setTimeout(res, 12000));
    if (i % 3 === 0) add(`Still assembling… (${(i+1)*12}s elapsed)`, "info");
    try {
      const sr = await fetch(`${RENDER}/video-status?script_id=${sid}`, { headers: H });
      if (!sr.ok) continue;
      const sd = await sr.json();
      if (sd.ready && sd.video_url) {
        add("Video assembled ✓", "success");
        if (onVideoReady) onVideoReady(sid, sd.video_url);
        return sd.video_url;
      }
    } catch(e) { if (i % 3 === 0) add(`Poll error: ${e.message}`, "warn"); }
  }
  add("Timed out after 5 min — check Render logs", "warn");
  return null;
}

async function callPublish(sid, add) {
  await wakeRender(add);
  add("Waiting 5s before publish…", "info");
  await new Promise(res => setTimeout(res, 5000));
  add("Publishing to YouTube…", "step");
  const r = await fetch(`${RENDER}/publish`, {
    method:"POST", headers:H, body: JSON.stringify({ script_id: sid })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  add("Published to YouTube ✓", "success");
}

async function callPublishInstagram(sid, add) {
  add("Publishing to Instagram…", "step");
  const r = await fetch(`${RENDER}/publish-instagram`, {
    method:"POST", headers:H, body: JSON.stringify({ script_id: sid })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  add("Published to Instagram ✓", "success");
}

async function wakeAndPublishBoth(sid, add) {
  await callPublish(sid, add);
  await callPublishInstagram(sid, add);
}

// ── Videos Tab ────────────────────────────────────────────────────────────────
function VideosTab({ onReassemble, pipelineAdd }) {
  const [videos, setVideos]         = useState([]);
  const [loading, setLoading]       = useState(false);
  const [actionId, setActionId]     = useState(null);
  const [selected, setSelected]     = useState(new Set());
  const [massDeleting, setMassDeleting] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    setSelected(new Set());
    try {
      const r = await fetch(`${RENDER}/videos/list`, { headers: H });
      const d = await r.json();
      setVideos(d.videos || []);
    } catch(e) { console.error("videos/list error", e); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, []);

  function toggleSelect(sid) {
    setSelected(s => {
      const n = new Set(s);
      n.has(sid) ? n.delete(sid) : n.add(sid);
      return n;
    });
  }
  function toggleAll() {
    setSelected(selected.size === videos.length
      ? new Set()
      : new Set(videos.map(v => v.script_id))
    );
  }

  async function deleteSingle(scriptId) {
    const r = await fetch(`${RENDER}/videos/delete`, {
      method:"POST", headers:H, body: JSON.stringify({ script_id: scriptId })
    });
    const d = await r.json();
    if (!d.deleted) throw new Error(`Delete fail ${scriptId.slice(0,8)}`);
    return scriptId;
  }

  async function handleDelete(scriptId) {
    if (!confirm("Delete this video permanently?")) return;
    setActionId(scriptId + "_del");
    try {
      await deleteSingle(scriptId);
      setVideos(v => v.filter(x => x.script_id !== scriptId));
      setSelected(s => { const n = new Set(s); n.delete(scriptId); return n; });
      pipelineAdd(`Deleted ${scriptId.slice(0,8)}… ✓`, "success");
    } catch(e) { pipelineAdd("Delete failed: " + e.message, "error"); }
    finally { setActionId(null); }
  }

  async function handleMassDelete() {
    const ids = [...selected];
    if (!ids.length) return;
    if (!confirm(`${ids.length} video(s)? This cannot be undone.`)) return;
    setMassDeleting(true);
    let deleted = 0;
    for (const sid of ids) {
      try {
        await deleteSingle(sid);
        setVideos(v => v.filter(x => x.script_id !== sid));
        setSelected(s => { const n = new Set(s); n.delete(sid); return n; });
        deleted++;
        pipelineAdd(`Delete ${sid.slice(0,8)}… (${deleted}/${ids.length})`, "info");
      } catch(e) { pipelineAdd(`Fail ${sid.slice(0,8)}: ${e.message}`, "error"); }
    }
    pipelineAdd(`Mass delete complete — ${deleted} / ${ids.length} ✓`, "success");
    setMassDeleting(false);
  }

  async function handlePublishBoth(scriptId) {
    setActionId(scriptId + "_pub");
    try {
      await wakeAndPublishBoth(scriptId, pipelineAdd);
      setVideos(v => v.map(x => x.script_id === scriptId
        ? { ...x, googalji_scripts: { ...x.googalji_scripts, published: true } }
        : x
      ));
      pipelineAdd(`Published ${scriptId.slice(0,8)}… ✓`, "success");
    } catch(e) { pipelineAdd("Publish failed: " + e.message, "error"); }
    finally { setActionId(null); }
  }

  const allSelected = videos.length > 0 && selected.size === videos.length;
  const someSelected = selected.size > 0;

  const smallBtn = (color, bg, disabled) => ({
    padding:"5px 12px", borderRadius:6, border:"none",
    fontSize:11, fontWeight:700,
    background: disabled ? "#1a0505" : bg,
    color: disabled ? "#3a1010" : color,
    cursor: disabled ? "not-allowed" : "pointer",
    opacity: disabled ? 0.5 : 1, whiteSpace:"nowrap"
  });

  return (
    <div style={{ maxWidth:680, margin:"0 auto" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:10, letterSpacing:"0.25em", color:"#d08060",
            textTransform:"uppercase" }}>Assembled Videos</div>
          <div style={{ fontSize:12, color:"#b06050", marginTop:3 }}>
            Review, publish, or delete.
          </div>
        </div>
        <button onClick={load} disabled={loading} style={{
          padding:"7px 16px", borderRadius:7,
          border:"1px solid #4a1818", background:"#0d0404",
          color:"#d08060", fontSize:12, cursor: loading ? "not-allowed" : "pointer"
        }}>
          {loading ? "Loading…" : "↻ Refresh"}
        </button>
      </div>

      {someSelected && (
        <div style={{
          display:"flex", alignItems:"center", gap:10, marginBottom:14,
          padding:"10px 14px", borderRadius:8, background:"#140404",
          border:"1px solid #4a1010", animation:"fadein 0.2s ease"
        }}>
          <span style={{ fontSize:12, color:"#c89090", flex:1 }}>
            {selected.size} selected
          </span>
          <button disabled={massDeleting} onClick={handleMassDelete} style={{
            padding:"6px 16px", borderRadius:6, border:"none",
            fontSize:12, fontWeight:700,
            background: massDeleting ? "#2a0808" : "linear-gradient(135deg,#5a0808,#8a1010)",
            color: massDeleting ? "#3a1010" : "#ffd8d8",
            cursor: massDeleting ? "not-allowed" : "pointer"
          }}>
            {massDeleting ? "Deleting…" : `🗑 Delete ${selected.size}`}
          </button>
          <button onClick={() => setSelected(new Set())} style={{
            padding:"6px 12px", borderRadius:6, border:"1px solid #3a1010",
            background:"none", color:"#b06050", fontSize:11, cursor:"pointer"
          }}>Cancel</button>
        </div>
      )}

      {videos.length > 0 && (
        <div style={{
          display:"flex", alignItems:"center", gap:8, marginBottom:12,
          padding:"6px 4px", borderBottom:"1px solid #1a0505", flexWrap:"wrap"
        }}>
          <input type="checkbox" checked={allSelected} onChange={toggleAll}
            style={{ width:15, height:15, accentColor:"#c0392b", cursor:"pointer" }} />
          <span style={{ fontSize:11, color:"#b06050", cursor:"pointer", marginRight:6 }}
            onClick={toggleAll}>
            {allSelected ? "Deselect all" : `All (${videos.length})`}
          </span>
          <button onClick={() => setSelected(new Set(videos.filter(v => !v.googalji_scripts?.published).map(v => v.script_id)))}
            style={{ padding:"3px 10px", borderRadius:5, border:"1px solid #3a2808",
              background:"#100c03", color:"#d4a017", fontSize:10, cursor:"pointer" }}>
            Unpublished ({videos.filter(v => !v.googalji_scripts?.published).length})
          </button>
          <button onClick={() => setSelected(new Set(videos.filter(v => v.googalji_scripts?.published).map(v => v.script_id)))}
            style={{ padding:"3px 10px", borderRadius:5, border:"1px solid #1a3a1a",
              background:"#080f08", color:"#4caf50", fontSize:10, cursor:"pointer" }}>
            Published ({videos.filter(v => v.googalji_scripts?.published).length})
          </button>
        </div>
      )}

      {loading && videos.length === 0 && (
        <div style={{ color:"#3a1010", fontSize:13, textAlign:"center", padding:"40px 0" }}>
          Loading…
        </div>
      )}
      {!loading && videos.length === 0 && (
        <div style={{
          color:"#3a1010", fontSize:13, textAlign:"center", padding:"40px 0",

// ── Render Wake Button ────────────────────────────────────────────────────────
function RenderWakeButton({ onWakeLog }) {
  const SLEEP_MS    = 15 * 60 * 1000;
  const COUNTDOWN_S = 2 * 60;

  const [waking, setWaking]       = useState(false);
  const [countdown, setCountdown] = useState(null);
  const [sleepsIn, setSleepsIn]   = useState(null);
  const timerRef                  = useRef(null);
  const sleepRef                  = useRef(null);

  function clearTimers() {
    if (timerRef.current) clearInterval(timerRef.current);
    if (sleepRef.current) clearTimeout(sleepRef.current);
  }

  function startSleepCountdown() {
    const wakeTime = Date.now();
    sleepRef.current = setTimeout(() => setSleepsIn(null), SLEEP_MS);
    timerRef.current = setInterval(() => {
      const remaining = SLEEP_MS - (Date.now() - wakeTime);
      if (remaining <= 0) { clearInterval(timerRef.current); setSleepsIn(null); }
      else setSleepsIn(remaining);
    }, 1000);
  }

  function startCountdown() {
    setCountdown(COUNTDOWN_S);
    const start = Date.now();
    const tick = setInterval(() => {
      const left = COUNTDOWN_S - Math.floor((Date.now() - start) / 1000);
      if (left <= 0) { clearInterval(tick); setCountdown(null); }
      else setCountdown(left);
    }, 500);
  }

  async function handleWake() {
    setWaking(true);
    clearTimers();
    setSleepsIn(SLEEP_MS);
    try {
      onWakeLog("Waking Render…", "step");
      for (let i = 0; i < 10; i++) {
        try {
          const r = await fetch(`${RENDER}/`, { signal: AbortSignal.timeout(9000) });
          if (r.ok) { onWakeLog("Render is awake ✓", "success"); break; }
        } catch(e) {}
        if (i < 9) { onWakeLog(`Not ready yet… attempt ${i+2}`, "info"); await new Promise(r => setTimeout(r, 8000)); }
      }
      startCountdown();
      startSleepCountdown();
    } catch(e) {
      onWakeLog("Wake failed: " + e.message, "error");
      setSleepsIn(null);
    } finally { setWaking(false); }
  }

  useEffect(() => () => clearTimers(), []);

  const isDisabled = waking || sleepsIn !== null;

  function fmtMs(ms) {
    const s = Math.ceil(ms / 1000);
    const m = Math.floor(s / 60);
    return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
  }

  return (
    <div style={{
      maxWidth:680, margin:"0 auto 16px",
      background:"#0a0202", border:"1px solid #2a0808",
      borderTop:"2px solid #5a1010",
      borderRadius:10, padding:"12px 16px",
      display:"flex", alignItems:"center", gap:14, flexWrap:"wrap"
    }}>
      <button
        disabled={isDisabled}
        onClick={handleWake}
        style={{
          padding:"8px 20px", borderRadius:8, border:"none",
          fontSize:13, fontWeight:700,
          background: isDisabled
            ? "#1a0505"
            : "linear-gradient(135deg,#6a1010,#a01818)",
          color: isDisabled ? "#3a1010" : "#ffd0c8",
          cursor: isDisabled ? "not-allowed" : "pointer",
          whiteSpace:"nowrap",
          boxShadow: isDisabled ? "none" : "0 2px 12px rgba(160,24,24,0.35)"
        }}>
        {waking ? "Waking…" : "⚡ Wake Render"}
      </button>

      <div style={{ flex:1, minWidth:120 }}>
        {countdown !== null && (
          <div style={{ fontSize:12, color:"#4caf50" }}>
            <span style={{ fontWeight:700 }}>Render warming up — {countdown}s</span>
            {" "}<span style={{ color:"#2a5a2a", fontSize:11 }}>/ 2:00</span>
          </div>
        )}
        {countdown === null && sleepsIn !== null && (
          <div style={{ fontSize:11, color:"#7a4040" }}>
            Render active — sleeps in {fmtMs(sleepsIn)}
          </div>
        )}
        {countdown === null && sleepsIn === null && (
          <div style={{ fontSize:11, color:"#4a1a1a" }}>
            Render may be asleep. Wake before assembling.
          </div>
        )}
      </div>

      {sleepsIn !== null && countdown === null && (
        <div style={{ width:8, height:8, borderRadius:"50%",
          background:"#4caf50", flexShrink:0,
          boxShadow:"0 0 6px #4caf50" }} />
      )}
      {countdown !== null && (
        <div style={{ width:8, height:8, borderRadius:"50%",
          background:"#c0392b", flexShrink:0,
          animation:"pulse 1s infinite",
          boxShadow:"0 0 6px #c0392b" }} />
      )}
    </div>
  );
}

                        setAssembled(a => ({...a, published:true}));
                        setVideosKey(k => k+1);
                      } catch(e) { add("Publish failed: "+e.message, "error"); }
                      finally { setPublishing(false); }
                    }}
                    style={{
                      width:"100%", padding:"12px 0", borderRadius:8, border:"none",
                      fontSize:14, fontWeight:700,
                      cursor: publishing ? "not-allowed" : "pointer",
                      background: publishing ? "#1a0505"
                        : "linear-gradient(135deg,#7a1010,#b82020)",
                      color: publishing ? "#2a0808" : "#f0d0d0",
                      boxShadow: publishing ? "none" : "0 2px 20px rgba(180,20,20,0.25)"
                    }}>
                    {publishing
                      ? "Publishing to YouTube then Instagram…"
                      : "▶ Publish to YouTube + Instagram"}
                  </button>
                )}
              </div>
            )}

            <IncompleteJobs onAssemble={handleReassemble} />
          </>
        )}

        {tab === "videos" && (
          <VideosTab key={videosKey} onReassemble={handleReassemble} pipelineAdd={add} />
        )}
      </div>

      {/* Console */}
      <LogConsole logs={logs} onClear={clear} />

      {/* ── Assemble Modal ── */}
      <Modal show={showAssemble} title="Assemble Video" subtitle="New script or existing ID"
        icon="📖" onClose={() => setShowAssemble(false)}>
        <div style={{ display:"flex", gap:8, marginBottom:20 }}>
          <button style={toggleBtn(assembleMode==="new")}
            onClick={() => setAssembleMode("new")}>New Script</button>
          <button style={toggleBtn(assembleMode==="old")}
            onClick={() => setAssembleMode("old")}>Existing ID</button>
        </div>
        {assembleMode === "new" && (
          <div style={{ marginBottom:20 }}>
            <CatPicker value={aCategory} onChange={setACategory} />
          </div>
        )}
        {assembleMode === "old" && (
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:10, letterSpacing:"0.2em", color:"#d08060",
              textTransform:"uppercase", marginBottom:8 }}>Script ID</div>
            <input value={aScriptId} onChange={e => setAScriptId(e.target.value)}
              placeholder="paste UUID here…"
              style={{
                width:"100%", padding:"10px 14px", background:"#080101",
                border:"1px solid #5a1a1a", borderRadius:7, color:"#f0d0c0",
                fontFamily:"monospace", fontSize:12, outline:"none"
              }} />
            <div style={{ fontSize:11, color:"#c07060", marginTop:5 }}>
              Voice + image must already exist for this ID.
            </div>
          </div>
        )}
        <button onClick={runAssemble} style={primaryBtn(false)}>
          {assembleMode === "new" ? "Generate + Assemble" : "Assemble This ID"}
        </button>
      </Modal>

      {/* ── Full Pipeline Modal ── */}
      <Modal show={showFull} title="Generate & Publish" subtitle="Full pipeline in one run"
        icon="🕉" onClose={() => setShowFull(false)}>
        <div style={{ marginBottom:20 }}>
          <CatPicker value={fCategory} onChange={setFCategory} />
        </div>
        <div style={{
          fontSize:12, color:"#c87060", marginBottom:20, lineHeight:1.8,
          padding:"12px 14px", background:"#080101", borderRadius:7,
          border:"1px solid #2a0808"
        }}>
          Council → Voice + Image → Assembly → YouTube + Instagram.<br/>
          Takes 3–5 minutes. Keep this tab open.
        </div>
        <button onClick={runFull} style={deepRedBtn(false)}>
          Run Full Pipeline
        </button>
      </Modal>

    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e.message }; }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: { color:'#f88', padding:40, fontFamily:'monospace', fontSize:13, whiteSpace:'pre-wrap' }
      }, 'Render error:\n' + this.state.error);
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
